<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión PSI</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">        
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestión PSI">
    <link rel="apple-touch-icon" href="cerebro.png?v=4">
    <link rel="icon" type="image/png" href="cerebro.png?v=4">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden; 
            background-color: #6c5ce7;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="appFrame" src="" allow="geolocation; microphone; camera; fullscreen"></iframe>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsNI91AKtzNHLfasbtbmdGf4e-QGTM8ExUo-G5c6okhTvXIKVKkQyygY5Qv_e2VOFWBA/exec";

        // ¿Vienen datos de sesión desde paginaPuente?
        const params = new URLSearchParams(window.location.search);
        const email = params.get('e');
        const token = params.get('t');
        const walkthrough = params.get('w');

        if (email && token) {
            // Guardar en localStorage de sintomasoftware.com.ar
            localStorage.setItem("usuario_gestion_psi", decodeURIComponent(email));
            localStorage.setItem("token_gestion_psi", decodeURIComponent(token));
            localStorage.setItem("psi_onboarding_status", decodeURIComponent(walkthrough || 'ACTIVO'));
            // Limpiar URL
            window.history.replaceState({}, document.title, "/");
        }

        // Construir URL del iframe con sesión si existe
        const sesionEmail = localStorage.getItem("usuario_gestion_psi");
        const sesionToken = localStorage.getItem("token_gestion_psi");

        let iframeSrc = SCRIPT_URL;
        if (sesionEmail && sesionToken) {
        const walkthrough = localStorage.getItem("psi_onboarding_status") || "INACTIVO";
        iframeSrc += `?e=${encodeURIComponent(sesionEmail)}&t=${encodeURIComponent(sesionToken)}&w=${encodeURIComponent(walkthrough)}`;
        }

        document.getElementById('appFrame').src = iframeSrc;
    </script>
</body>
</html>
